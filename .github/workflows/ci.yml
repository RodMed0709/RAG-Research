name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # core + dev only — the test suite runs without the heavy [paperqa] extra
      # (the substrate lazy-imports paperqa; no test instantiates it).
      - run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check src tests
      - name: mypy
        run: mypy src/rag_research
      - name: pytest
        run: pytest -q
