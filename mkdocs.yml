site_name: RAG-Research
site_description: Reproducibility-consistency verification for ML code, grounded in papers.
repo_url: https://github.com/RodMed0709/RAG-Research
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
  features:
    - content.code.copy

nav:
  - Home: index.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences

# keep internal planning docs out of the published site
exclude_docs: |
  superpowers/
