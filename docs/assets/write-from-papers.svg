<svg xmlns="http://www.w3.org/2000/svg" width="900" height="680" viewBox="0 0 900 680" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="900" height="680" rx="18" fill="#f8fafc"/>
  <rect x="0" y="0" width="900" height="680" rx="18" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <!-- title -->
  <text x="450" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">WRITE-from-papers</text>
  <text x="450" y="72" text-anchor="middle" font-size="14" fill="#64748b">cada oración nace anclada a evidencia verbatim — o se marca, nunca se inventa</text>

  <!-- 1. outline -->
  <rect x="330" y="100" width="240" height="56" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="126" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">outline (bullets)</text>
  <text x="450" y="145" text-anchor="middle" font-size="12" fill="#64748b">lo que quieres decir</text>

  <line x1="450" y1="156" x2="450" y2="186" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. retrieve -->
  <rect x="300" y="190" width="300" height="64" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="216" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">retrieve_evidence(bullet, corpus)</text>
  <text x="450" y="236" text-anchor="middle" font-size="12" fill="#64748b">substrate PaperQA2 · k pasajes verbatim</text>

  <line x1="450" y1="254" x2="450" y2="284" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. engine box (highlight) -->
  <rect x="250" y="288" width="400" height="118" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">MOTOR ANTI-ALUCINACIÓN (reusado)</text>
  <rect x="274" y="324" width="352" height="34" rx="9" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="450" y="346" text-anchor="middle" font-size="13" fill="#0f172a">writer LLM redacta 1 oración · sólo desde el verbatim</text>
  <rect x="274" y="362" width="352" height="34" rx="9" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="450" y="384" text-anchor="middle" font-size="13" fill="#0f172a">verify_claim decide el veredicto — no el LLM</text>

  <!-- branch arrows -->
  <line x1="380" y1="406" x2="250" y2="452" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="406" x2="650" y2="452" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ANCHORED -->
  <rect x="90" y="456" width="290" height="70" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="235" y="482" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">✅ ANCHORED</text>
  <text x="235" y="504" text-anchor="middle" font-size="12.5" fill="#065f46">redacta la oración + [cita] anclada</text>

  <!-- NO_EVIDENCE -->
  <rect x="520" y="456" width="290" height="70" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="665" y="482" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">❌ NO_EVIDENCE</text>
  <text x="665" y="504" text-anchor="middle" font-size="12.5" fill="#991b1b">marca «[SIN EVIDENCIA]» — no inventa</text>

  <!-- merge to render -->
  <line x1="235" y1="526" x2="420" y2="566" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="665" y1="526" x2="480" y2="566" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. render -->
  <rect x="290" y="570" width="320" height="70" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="596" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">render_section()</text>
  <text x="450" y="617" text-anchor="middle" font-size="12" fill="#64748b">prosa + citas + draft-cards trazables (auditoría)</text>
</svg>
