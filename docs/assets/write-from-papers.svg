<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="560" height="560" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="559" height="559" rx="16" fill="none" stroke="#e5e7eb"/>

  <text x="40" y="48" font-size="20" font-weight="700" fill="#111827">Anchored drafting</text>
  <text x="40" y="70" font-size="13" fill="#6b7280">Every sentence tied to a source, or flagged.</text>

  <!-- outline -->
  <rect x="190" y="98" width="180" height="46" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="280" y="120" text-anchor="middle" font-size="13.5" font-weight="600" fill="#111827">outline bullets</text>
  <text x="280" y="136" text-anchor="middle" font-size="11" fill="#9ca3af">your points</text>
  <line x1="280" y1="144" x2="280" y2="168" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- retrieve -->
  <rect x="180" y="172" width="200" height="46" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="280" y="194" text-anchor="middle" font-size="13.5" font-weight="600" fill="#111827">retrieve evidence</text>
  <text x="280" y="210" text-anchor="middle" font-size="11" fill="#9ca3af">verbatim passages</text>
  <line x1="280" y1="218" x2="280" y2="242" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- engine -->
  <rect x="170" y="246" width="220" height="70" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="280" y="270" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3730a3">grounded engine</text>
  <text x="280" y="288" text-anchor="middle" font-size="11.5" fill="#4338ca">writer drafts from the verbatim</text>
  <text x="280" y="304" text-anchor="middle" font-size="11.5" fill="#4338ca">verify decides, not the LLM</text>

  <!-- branches -->
  <line x1="240" y1="316" x2="165" y2="356" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="320" y1="316" x2="395" y2="356" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- anchored -->
  <rect x="40" y="360" width="200" height="58" rx="10" fill="#f0fdf4" stroke="#86efac"/>
  <text x="140" y="384" text-anchor="middle" font-size="13.5" font-weight="700" fill="#15803d">anchored</text>
  <text x="140" y="402" text-anchor="middle" font-size="11" fill="#166534">keep it, add a citation</text>

  <!-- no evidence -->
  <rect x="320" y="360" width="200" height="58" rx="10" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="420" y="384" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b91c1c">no evidence</text>
  <text x="420" y="402" text-anchor="middle" font-size="11" fill="#991b1b">flag it, never invent</text>

  <!-- merge -->
  <line x1="140" y1="418" x2="255" y2="460" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="420" y1="418" x2="305" y2="460" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- output -->
  <rect x="180" y="464" width="200" height="50" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="280" y="487" text-anchor="middle" font-size="13.5" font-weight="600" fill="#111827">rendered section</text>
  <text x="280" y="504" text-anchor="middle" font-size="11" fill="#9ca3af">prose, citations, audit trail</text>
</svg>
