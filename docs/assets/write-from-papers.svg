<svg xmlns="http://www.w3.org/2000/svg" width="760" height="640" viewBox="0 0 760 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="eng" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/><stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="s2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="760" height="640" rx="20" fill="#f8fafc"/>
  <rect x="0.5" y="0.5" width="759" height="639" rx="20" fill="none" stroke="#e2e8f0"/>

  <text x="380" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Anchored drafting</text>
  <text x="380" y="70" text-anchor="middle" font-size="13.5" fill="#64748b">Every sentence tied to a verbatim source — or flagged. Never invented.</text>

  <!-- 1 outline -->
  <g transform="translate(255,92)">
    <rect width="250" height="58" rx="13" fill="#ffffff" stroke="#e2e8f0" filter="url(#s2)"/>
    <g transform="translate(20,20)" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round"><line x1="0" y1="0" x2="0" y2="0"/><circle cx="1" cy="2" r="1.3" fill="#475569" stroke="none"/><line x1="6" y1="2" x2="18" y2="2"/><circle cx="1" cy="9" r="1.3" fill="#475569" stroke="none"/><line x1="6" y1="9" x2="18" y2="9"/><circle cx="1" cy="16" r="1.3" fill="#475569" stroke="none"/><line x1="6" y1="16" x2="18" y2="16"/></g>
    <text x="52" y="26" font-size="14.5" font-weight="600" fill="#0f172a">your outline (bullets)</text>
    <text x="52" y="44" font-size="11.5" fill="#64748b">the points you want to make</text>
  </g>
  <line x1="380" y1="150" x2="380" y2="178" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- 2 retrieve -->
  <g transform="translate(235,182)">
    <rect width="290" height="60" rx="13" fill="#ffffff" stroke="#e2e8f0" filter="url(#s2)"/>
    <g transform="translate(20,20)" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round"><circle cx="8" cy="8" r="7"/><line x1="13" y1="13" x2="19" y2="19"/></g>
    <text x="52" y="26" font-size="14.5" font-weight="600" fill="#0f172a">retrieve evidence</text>
    <text x="52" y="44" font-size="11.5" fill="#64748b">PaperQA2 substrate · k verbatim passages</text>
  </g>
  <line x1="380" y1="242" x2="380" y2="270" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- 3 engine -->
  <g transform="translate(190,274)">
    <rect width="380" height="116" rx="16" fill="url(#eng)" stroke="#c7d2fe" filter="url(#s2)"/>
    <g transform="translate(22,16)" stroke="#4338ca" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="9" r="3"/><path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.5 3.5l1.4 1.4M13.1 13.1l1.4 1.4M3.5 14.5l1.4-1.4M13.1 4.9l1.4-1.4"/>
    </g>
    <text x="50" y="22" font-size="12.5" font-weight="700" fill="#4338ca">GROUNDED ENGINE (reused)</text>
    <rect x="22" y="40" width="336" height="30" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="38" y="59" font-size="12" fill="#0f172a">writer LLM drafts one sentence — from the verbatim only</text>
    <rect x="22" y="76" width="336" height="30" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="38" y="95" font-size="12" fill="#0f172a">verify decides the verdict — not the LLM</text>
  </g>

  <!-- branches -->
  <path d="M300 390 L210 432" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M460 390 L550 432" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- anchored -->
  <g transform="translate(60,436)">
    <rect width="270" height="68" rx="13" fill="#ecfdf5" stroke="#10b981" filter="url(#s2)"/>
    <circle cx="34" cy="34" r="18" fill="#ffffff"/>
    <g transform="translate(25,25)" stroke="#047857" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,9 7,14 16,4"/></g>
    <text x="62" y="30" font-size="14.5" font-weight="700" fill="#047857">ANCHORED</text>
    <text x="62" y="49" font-size="11.5" fill="#065f46">keep the sentence + its [citation]</text>
  </g>

  <!-- no evidence -->
  <g transform="translate(430,436)">
    <rect width="270" height="68" rx="13" fill="#fef2f2" stroke="#ef4444" filter="url(#s2)"/>
    <circle cx="34" cy="34" r="18" fill="#ffffff"/>
    <g transform="translate(26,26)" stroke="#b91c1c" stroke-width="2.2" fill="none" stroke-linecap="round"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></g>
    <text x="62" y="30" font-size="14.5" font-weight="700" fill="#b91c1c">NO EVIDENCE</text>
    <text x="62" y="49" font-size="11.5" fill="#991b1b">mark [NO EVIDENCE] — don't invent</text>
  </g>

  <!-- merge -->
  <path d="M195 504 L360 548" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M565 504 L400 548" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- output -->
  <g transform="translate(245,552)">
    <rect width="270" height="62" rx="13" fill="#ffffff" stroke="#e2e8f0" filter="url(#s2)"/>
    <g transform="translate(20,18)" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 1h9l5 5v15H4z"/><polyline points="13,1 13,6 18,6"/><line x1="8" y1="12" x2="15" y2="12"/><line x1="8" y1="16" x2="15" y2="16"/></g>
    <text x="52" y="26" font-size="14.5" font-weight="600" fill="#0f172a">rendered section</text>
    <text x="52" y="44" font-size="11.5" fill="#64748b">prose + citations + traceable draft-cards</text>
  </g>
</svg>
