<svg xmlns="http://www.w3.org/2000/svg" width="920" height="470" viewBox="0 0 920 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="920" height="470" rx="20" fill="#f8fafc"/>
  <rect x="0.5" y="0.5" width="919" height="469" rx="20" fill="none" stroke="#e2e8f0"/>

  <!-- header -->
  <g transform="translate(40,40)">
    <g transform="translate(0,-2)" stroke="#4338ca" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="6" r="3"/><line x1="11" y1="9" x2="11" y2="24"/>
      <path d="M3 15a8 8 0 0 0 16 0"/><line x1="3" y1="15" x2="6" y2="15"/><line x1="19" y1="15" x2="16" y2="15"/>
    </g>
    <text x="34" y="14" font-size="25" font-weight="700" fill="#0f172a">One grounded engine, four review jobs</text>
    <text x="34" y="37" font-size="14" fill="#64748b">Every assertion anchored to a verbatim source — or flagged. Never invented.</text>
  </g>

  <!-- engine pill -->
  <g transform="translate(310,96)">
    <rect width="300" height="58" rx="14" fill="url(#engine)" filter="url(#sh)"/>
    <g transform="translate(20,17)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2 3 6v6c0 5 4 8 9 10 5-2 9-5 9-10V6z"/><path d="M8.5 12l2.5 2.5 4.5-5"/>
    </g>
    <text x="52" y="26" font-size="16" font-weight="700" fill="#ffffff">anchor + verify engine</text>
    <text x="52" y="44" font-size="11.5" fill="#e0e7ff">verbatim anchor · verdict decided by code, not the LLM</text>
  </g>

  <!-- connectors -->
  <g stroke="#cbd5e1" stroke-width="1.5">
    <path d="M460 154 L120 196" fill="none"/>
    <path d="M460 154 L370 196" fill="none"/>
    <path d="M460 154 L550 196" fill="none"/>
    <path d="M460 154 L800 196" fill="none"/>
  </g>

  <!-- cards -->
  <!-- card template via groups -->
  <g transform="translate(40,198)">
    <rect width="195" height="228" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="34" cy="38" r="20" fill="#ecfdf5"/>
    <g transform="translate(24,28)" stroke="#047857" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6,4 1,10 6,16"/><polyline points="14,4 19,10 14,16"/>
    </g>
    <text x="68" y="36" font-size="15" font-weight="700" fill="#047857">Check</text>
    <text x="68" y="53" font-size="15" font-weight="700" fill="#047857">code ↔ paper</text>
    <text x="20" y="92" font-size="12" fill="#334155">Flags where your code</text>
    <text x="20" y="110" font-size="12" fill="#334155">stops honoring the</text>
    <text x="20" y="128" font-size="12" fill="#334155">paper's reproducibility</text>
    <text x="20" y="146" font-size="12" fill="#334155">norms, with a stamp</text>
    <text x="20" y="164" font-size="12" fill="#334155">that catches drift.</text>
    <rect x="20" y="190" width="92" height="24" rx="12" fill="#ecfdf5"/>
    <text x="34" y="206" font-size="11" font-weight="600" fill="#10b981">✓ shipped</text>
  </g>

  <g transform="translate(250,198)">
    <rect width="195" height="228" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="34" cy="38" r="20" fill="#eff6ff"/>
    <g transform="translate(25,28)" stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 2h9l5 5v13H4z"/><polyline points="13,2 13,7 18,7"/><polyline points="7.5,13 9.5,15 13,11"/>
    </g>
    <text x="68" y="36" font-size="15" font-weight="700" fill="#1d4ed8">Review</text>
    <text x="68" y="53" font-size="15" font-weight="700" fill="#1d4ed8">a manuscript</text>
    <text x="20" y="92" font-size="12" fill="#334155">Builds the state of the</text>
    <text x="20" y="110" font-size="12" fill="#334155">art and verifies your</text>
    <text x="20" y="128" font-size="12" fill="#334155">claims against the</text>
    <text x="20" y="146" font-size="12" fill="#334155">corpus; flags the</text>
    <text x="20" y="164" font-size="12" fill="#334155">unsupported ones.</text>
    <rect x="20" y="190" width="92" height="24" rx="12" fill="#eff6ff"/>
    <text x="34" y="206" font-size="11" font-weight="600" fill="#2563eb">✓ shipped</text>
  </g>

  <g transform="translate(460,198)">
    <rect width="195" height="228" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="34" cy="38" r="20" fill="#fef3c7"/>
    <g transform="translate(25,27)" stroke="#b45309" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2l4 4-10 10-4 1 1-4z"/><line x1="11" y1="5" x2="15" y2="9"/>
    </g>
    <text x="68" y="36" font-size="15" font-weight="700" fill="#b45309">Draft,</text>
    <text x="68" y="53" font-size="15" font-weight="700" fill="#b45309">anchored</text>
    <text x="20" y="92" font-size="12" fill="#334155">Helps you write from</text>
    <text x="20" y="110" font-size="12" fill="#334155">your outline, every</text>
    <text x="20" y="128" font-size="12" fill="#334155">sentence tied to</text>
    <text x="20" y="146" font-size="12" fill="#334155">evidence — unsupported</text>
    <text x="20" y="164" font-size="12" fill="#334155">bullets marked, not faked.</text>
    <rect x="20" y="190" width="92" height="24" rx="12" fill="#fef3c7"/>
    <text x="34" y="206" font-size="11" font-weight="600" fill="#b45309">✓ shipped</text>
  </g>

  <g transform="translate(685,198)">
    <rect width="195" height="228" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="34" cy="38" r="20" fill="#f5f3ff"/>
    <g transform="translate(24,28)" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 2h8l4 4v8H4z"/><polyline points="7,17 4,17 4,9"/><polyline points="9.5,7 7.5,9 9.5,11"/><polyline points="13.5,7 15.5,9 13.5,11"/>
    </g>
    <text x="68" y="36" font-size="15" font-weight="700" fill="#6d28d9">Methods</text>
    <text x="68" y="53" font-size="15" font-weight="700" fill="#6d28d9">↔ code</text>
    <text x="20" y="92" font-size="12" fill="#334155">Drafts and checks your</text>
    <text x="20" y="110" font-size="12" fill="#334155">Methods against the</text>
    <text x="20" y="128" font-size="12" fill="#334155">repo, every number</text>
    <text x="20" y="146" font-size="12" fill="#334155">pinned to a real code</text>
    <text x="20" y="164" font-size="12" fill="#334155">line; mismatches flagged.</text>
    <rect x="20" y="190" width="92" height="24" rx="12" fill="#f5f3ff"/>
    <text x="34" y="206" font-size="11" font-weight="600" fill="#7c3aed">✓ shipped</text>
  </g>

  <text x="460" y="452" text-anchor="middle" font-size="12" fill="#94a3b8">Substrate: PaperQA2 (a dependency, not a fork) · LLM injected (DeepSeek by default)</text>
</svg>
