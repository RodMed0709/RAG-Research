<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="360" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="899" height="359" rx="16" fill="none" stroke="#e5e7eb"/>

  <!-- header -->
  <text x="40" y="50" font-size="22" font-weight="700" fill="#111827">RAG-Research</text>
  <text x="40" y="74" font-size="13.5" fill="#6b7280">A grounded reviewer for research code and writing.</text>

  <!-- engine -->
  <rect x="330" y="100" width="240" height="46" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <g transform="translate(352,114)" stroke="#4f46e5" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 1 2 4v5c0 4 3 6 7 8 4-2 7-4 7-8V4z"/><path d="M6 9l2 2 4-4"/>
  </g>
  <text x="382" y="128" font-size="13.5" font-weight="600" fill="#3730a3">anchor + verify engine</text>

  <!-- 4 cards (uniform: icon at x0+16, title at x0+42, desc at x0+16) -->
  <g>
    <!-- card 1 -->
    <rect x="40" y="178" width="195" height="132" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(56,200)" stroke="#475569" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,0 0,5 5,10"/><polyline points="11,0 16,5 11,10"/></g>
    <text x="82" y="211" font-size="14" font-weight="700" fill="#111827">Check code</text>
    <text x="56" y="248" font-size="12" fill="#6b7280">Flags where code</text>
    <text x="56" y="266" font-size="12" fill="#6b7280">drifts from the paper.</text>
    <text x="56" y="296" font-size="10.5" font-weight="600" fill="#16a34a">shipped</text>

    <!-- card 2 -->
    <rect x="255" y="178" width="195" height="132" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(271,198)" stroke="#475569" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M2 1h8l4 4v11H2z"/><polyline points="10,1 10,5 14,5"/><polyline points="5,11 7,13 10,9"/></g>
    <text x="297" y="211" font-size="14" font-weight="700" fill="#111827">Review</text>
    <text x="271" y="248" font-size="12" fill="#6b7280">Verifies claims</text>
    <text x="271" y="266" font-size="12" fill="#6b7280">against the corpus.</text>
    <text x="271" y="296" font-size="10.5" font-weight="600" fill="#16a34a">shipped</text>

    <!-- card 3 -->
    <rect x="470" y="178" width="195" height="132" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(486,198)" stroke="#475569" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1l4 4-10 10-4 1 1-4z"/><line x1="10" y1="3" x2="14" y2="7"/></g>
    <text x="512" y="211" font-size="14" font-weight="700" fill="#111827">Draft</text>
    <text x="486" y="248" font-size="12" fill="#6b7280">Every sentence</text>
    <text x="486" y="266" font-size="12" fill="#6b7280">tied to evidence.</text>
    <text x="486" y="296" font-size="10.5" font-weight="600" fill="#16a34a">shipped</text>

    <!-- card 4 -->
    <rect x="685" y="178" width="175" height="132" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(701,198)" stroke="#475569" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M2 1h7l4 4v9H2z"/><polyline points="6,8 4,10 6,12"/><polyline points="10,8 12,10 10,12"/></g>
    <text x="727" y="211" font-size="14" font-weight="700" fill="#111827">Methods</text>
    <text x="701" y="248" font-size="12" fill="#6b7280">Numbers pinned</text>
    <text x="701" y="266" font-size="12" fill="#6b7280">to real code.</text>
    <text x="701" y="296" font-size="10.5" font-weight="600" fill="#16a34a">shipped</text>
  </g>

  <text x="40" y="340" font-size="11.5" fill="#9ca3af">Anchored to evidence, or flagged. Never invented.</text>
</svg>
