<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="430" rx="18" fill="#f8fafc"/>
  <rect x="0" y="0" width="900" height="430" rx="18" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <text x="450" y="44" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">One grounded engine, four review jobs</text>
  <text x="450" y="69" text-anchor="middle" font-size="13.5" fill="#64748b">every assertion anchored to a verbatim source — or flagged, never invented</text>

  <!-- engine core -->
  <rect x="300" y="92" width="300" height="62" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2.5" filter="url(#s)"/>
  <text x="450" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#4338ca">anchor + verify (engine)</text>
  <text x="450" y="140" text-anchor="middle" font-size="12" fill="#6366f1">verbatim anchor · verdict by code, not the LLM</text>

  <!-- connectors -->
  <line x1="450" y1="154" x2="130" y2="206" stroke="#94a3b8" stroke-width="1.6"/>
  <line x1="450" y1="154" x2="370" y2="206" stroke="#94a3b8" stroke-width="1.6"/>
  <line x1="450" y1="154" x2="600" y2="206" stroke="#94a3b8" stroke-width="1.6"/>
  <line x1="450" y1="154" x2="800" y2="206" stroke="#94a3b8" stroke-width="1.6"/>

  <!-- job 1 CODE -->
  <rect x="35" y="208" width="190" height="150" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#s)"/>
  <text x="130" y="234" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">check code ↔ paper</text>
  <text x="130" y="256" text-anchor="middle" font-size="11.5" fill="#334155">flags where code stops</text>
  <text x="130" y="273" text-anchor="middle" font-size="11.5" fill="#334155">honoring the paper's</text>
  <text x="130" y="290" text-anchor="middle" font-size="11.5" fill="#334155">repro norms</text>
  <text x="130" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">✅ shipped</text>

  <!-- job 2 REVIEW -->
  <rect x="245" y="208" width="190" height="150" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#s)"/>
  <text x="340" y="234" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">review manuscript</text>
  <text x="340" y="256" text-anchor="middle" font-size="11.5" fill="#334155">state of the art +</text>
  <text x="340" y="273" text-anchor="middle" font-size="11.5" fill="#334155">verify claims vs corpus,</text>
  <text x="340" y="290" text-anchor="middle" font-size="11.5" fill="#334155">flag the unsupported</text>
  <text x="340" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">✅ shipped</text>

  <!-- job 3 DRAFT from papers -->
  <rect x="475" y="208" width="190" height="150" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#s)"/>
  <text x="570" y="234" text-anchor="middle" font-size="14.5" font-weight="700" fill="#047857">draft, anchored</text>
  <text x="570" y="256" text-anchor="middle" font-size="11.5" fill="#334155">help write a section,</text>
  <text x="570" y="273" text-anchor="middle" font-size="11.5" fill="#334155">each sentence tied to</text>
  <text x="570" y="290" text-anchor="middle" font-size="11.5" fill="#334155">evidence (or flagged)</text>
  <text x="570" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">✅ shipped</text>

  <!-- job 4 METHODS from code -->
  <rect x="705" y="208" width="190" height="150" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#s)"/>
  <text x="800" y="234" text-anchor="middle" font-size="14.5" font-weight="700" fill="#047857">Methods ↔ code</text>
  <text x="800" y="256" text-anchor="middle" font-size="11.5" fill="#334155">draft/check Methods,</text>
  <text x="800" y="273" text-anchor="middle" font-size="11.5" fill="#334155">every number pinned</text>
  <text x="800" y="290" text-anchor="middle" font-size="11.5" fill="#334155">to a real code line</text>
  <text x="800" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">✅ shipped</text>

  <text x="450" y="398" text-anchor="middle" font-size="12.5" fill="#64748b">substrate: PaperQA2 (a dependency, not a fork) · LLM injected (DeepSeek by default)</text>
</svg>
